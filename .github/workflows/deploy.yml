name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: 🔍 Debug - Show script.js before replacement
        run: |
          echo "=========================================="
          echo "📄 script.js BEFORE replacement:"
          echo "=========================================="
          cat script.js | head -10
          echo ""
          echo "🔍 Looking for placeholders:"
          grep -n "PUT_YOUR_GIST" script.js || echo "⚠️ No placeholder found!"
          echo "=========================================="
      
      - name: 🔄 Replace secrets with proper escaping
        run: |
          echo "=========================================="
          echo "🔄 Replacing secrets..."
          echo "=========================================="
          
          # جایگزینی GIST_ID - با دقت بیشتر
          GIST_ID_VALUE="${{ secrets.GIST_ID }}"
          GIST_TOKEN_VALUE="${{ secrets.GIST_TOKEN }}"
          
          echo "GIST_ID length: ${#GIST_ID_VALUE}"
          echo "GIST_TOKEN length: ${#GIST_TOKEN_VALUE}"
          
          # استفاده از @ به جای | برای جلوگیری از تداخل
          sed -i "s@PUT_YOUR_GIST_ID_HERE@${GIST_ID_VALUE}@g" script.js
          sed -i "s@PUT_YOUR_GIST_TOKEN_HERE@${GIST_TOKEN_VALUE}@g" script.js
          
          echo "✅ Replacement done"
          echo "=========================================="
      
      - name: 🔍 Debug - Show script.js after replacement
        run: |
          echo "=========================================="
          echo "📄 script.js AFTER replacement:"
          echo "=========================================="
          cat script.js | head -10
          echo ""
          echo "🔍 Checking if GIST_ID was replaced:"
          grep -n "GIST_ID = '" script.js | head -3
          echo ""
          echo "🔍 Checking if GIST_TOKEN was replaced:"
          grep -n "GIST_TOKEN = '" script.js | head -3
          echo "=========================================="
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4