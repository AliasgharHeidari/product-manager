name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: 🔍 Show script.js before replacement
        run: |
          echo "=========================================="
          echo "📄 script.js BEFORE:"
          echo "=========================================="
          head -10 script.js
      
      - name: 🔄 Replace secrets using multiple methods
        run: |
          echo "=========================================="
          echo "🔄 Replacing secrets..."
          echo "=========================================="
          
          # روش 1: استفاده از @
          sed -i "s@PUT_YOUR_GIST_ID_HERE@${{ secrets.GIST_ID }}@g" script.js
          sed -i "s@PUT_YOUR_GIST_TOKEN_HERE@${{ secrets.GIST_TOKEN }}@g" script.js
          
          # روش 2: استفاده از # (در صورت نیاز)
          # sed -i "s#PUT_YOUR_GIST_ID_HERE#${{ secrets.GIST_ID }}#g" script.js
          
          echo "✅ Replacement done"
      
      - name: 🔍 Show script.js after replacement
        run: |
          echo "=========================================="
          echo "📄 script.js AFTER:"
          echo "=========================================="
          head -10 script.js
          echo ""
          echo "🔍 Checking if GIST_ID was replaced:"
          grep -c "a1e0ae6053e9e0cd26072a8041fc95a9" script.js && echo "✅ GIST_ID found!" || echo "❌ GIST_ID NOT found!"
          echo ""
          echo "🔍 Checking if GIST_TOKEN was replaced:"
          grep -c "ghp_" script.js && echo "✅ GIST_TOKEN found!" || echo "❌ GIST_TOKEN NOT found!"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4