name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: 🔍 Check if secrets exist
        run: |
          echo "=========================================="
          echo "🔍 Checking Secrets..."
          echo "=========================================="
          
          # چک کردن GIST_TOKEN
          if [ -n "${{ secrets.GIST_TOKEN }}" ]; then
            echo "✅ GIST_TOKEN: exists"
            echo "✅ GIST_TOKEN length: $(echo -n "${{ secrets.GIST_TOKEN }}" | wc -c)"
            echo "✅ GIST_TOKEN starts with: $(echo "${{ secrets.GIST_TOKEN }}" | cut -c1-10)..."
          else
            echo "❌ GIST_TOKEN: NOT FOUND!"
          fi
          
          # چک کردن GIST_ID
          if [ -n "${{ secrets.GIST_ID }}" ]; then
            echo "✅ GIST_ID: exists"
            echo "✅ GIST_ID length: $(echo -n "${{ secrets.GIST_ID }}" | wc -c)"
            echo "✅ GIST_ID: $(echo "${{ secrets.GIST_ID }}" | cut -c1-10)..."
          else
            echo "❌ GIST_ID: NOT FOUND!"
          fi
          
          echo "=========================================="
      
      - name: 📄 Check script.js before replacement
        run: |
          echo "=========================================="
          echo "📄 script.js BEFORE replacement:"
          echo "=========================================="
          grep -n "PUT_YOUR_GIST" script.js || echo "⚠️ No placeholder found!"
          echo ""
          echo "🔍 First 5 lines of script.js:"
          head -5 script.js
          echo "=========================================="
      
      - name: 🔄 Replace secrets in script.js
        run: |
          echo "=========================================="
          echo "🔄 Replacing secrets in script.js..."
          echo "=========================================="
          
          # جایگزینی توکن
          if [ -n "${{ secrets.GIST_TOKEN }}" ]; then
            sed -i "s|PUT_YOUR_GIST_TOKEN_HERE|${{ secrets.GIST_TOKEN }}|g" script.js
            echo "✅ GIST_TOKEN replaced"
          else
            echo "❌ GIST_TOKEN is empty, skipping replacement"
          fi
          
          # جایگزینی Gist ID
          if [ -n "${{ secrets.GIST_ID }}" ]; then
            sed -i "s|PUT_YOUR_GIST_ID_HERE|${{ secrets.GIST_ID }}|g" script.js
            echo "✅ GIST_ID replaced"
          else
            echo "❌ GIST_ID is empty, skipping replacement"
          fi
          
          echo "=========================================="
      
      - name: 📄 Check script.js after replacement
        run: |
          echo "=========================================="
          echo "📄 script.js AFTER replacement:"
          echo "=========================================="
          
          # نمایش خطوط مربوط به GIST
          echo "🔍 Lines containing GIST:"
          grep -n "GIST_" script.js | head -5
          
          echo ""
          echo "🔍 First 10 lines of script.js:"
          head -10 script.js
          
          echo ""
          echo "🔍 Checking if ghp_ exists in file:"
          if grep -q "ghp_" script.js; then
            echo "✅ GIST_TOKEN was replaced successfully (ghp_ found)"
          else
            echo "⚠️ GIST_TOKEN was NOT replaced (no ghp_ found)"
          fi
          
          echo "=========================================="
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4